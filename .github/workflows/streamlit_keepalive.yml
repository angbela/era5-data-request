name: Streamlit Keepalive (Browser Visit)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Visit Streamlit apps
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');

          const urls = [
            'https://ang-era5.streamlit.app/',
            'https://ang-2dbpp.streamlit.app/',
            'https://ang-roseplot.streamlit.app/',
            'https://ang-tide.streamlit.app/',
            'https://cpm-test.streamlit.app/',
            'https://ang-tshd.streamlit.app/'            
          ];

          (async () => {
            const browser = await chromium.launch({ headless: true });

            for (const url of urls) {
              const page = await browser.newPage();
              try {
                console.log(`Visiting: ${url}`);

                await page.goto(url, {
                  waitUntil: 'domcontentloaded',
                  timeout: 60000
                });

                // Give Streamlit time to initialize the session
                await page.waitForTimeout(20000);

                console.log(`Success: ${url}`);
              } catch (err) {
                console.error(`Failed: ${url}`);
                console.error(err);
              } finally {
                await page.close();
              }
            }

            await browser.close();
          })();
          EOF
